name: Deploy Production

on:
  push:
    branches:
      - main
      - feature/ci-cd
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: how-about-us/ai-server

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Production
    needs: build
    runs-on:
      - self-hosted
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/how-about-us/ai-server
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write production environment
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          umask 077
          printf '%s\n' "$ENV_PROD" > .env.prod

      - name: Pull production image
        run: docker compose -f compose.prod.yaml pull ai-server

      - name: Start production service
        run: docker compose -f compose.prod.yaml up --wait --wait-timeout 120 --remove-orphans

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f compose.prod.yaml logs --no-color --tail=200 ai-server
