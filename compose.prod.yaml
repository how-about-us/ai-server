name: hbu-ai

services:
  ai-server:
    image: ${IMAGE:-ghcr.io/how-about-us/ai-server}:${IMAGE_TAG:-latest}
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
